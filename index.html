<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Star Mechanical — Technician Commissions</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6fa;--surface:#ffffff;--card:#ffffff;--border:#e2e5ed;
  --text:#1a1d27;--muted:#6b7085;--accent:#2563eb;--accent-dim:#dbeafe;
  --green:#059669;--yellow:#d97706;--orange:#ea580c;--red:#dc2626;
  --purple:#7c3aed;--cyan:#0891b2;
  --radius:10px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,sans-serif;
}
html{background:var(--bg);color:var(--text);font-size:14px}
body{min-height:100vh;display:flex;flex-direction:column}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;gap:16px;padding:14px 28px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.topbar .logo-img{height:44px;width:auto;flex-shrink:0}
.topbar .spacer{flex:1}
.fresh-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:.78rem;font-weight:600;background:var(--card);border:1px solid var(--border);color:var(--muted)}
.fresh-pill .dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.fresh-pill.fresh{color:var(--green)}
.fresh-pill.stale{color:var(--yellow)}

/* ── CONTROLS ── */
.controls{padding:14px 28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--surface)}
.controls label{font-size:.72rem;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:600}
select{background:var(--surface);color:var(--text);border:1px solid var(--border);padding:7px 12px;border-radius:6px;font-size:.82rem;outline:none;transition:border-color .2s;cursor:pointer}
select:focus{border-color:var(--accent)}
.config-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:.75rem;font-weight:600;background:var(--accent-dim);color:var(--accent);margin-left:auto}

/* ── STAT CARDS ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;padding:20px 28px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;display:flex;flex-direction:column;gap:4px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat-card .label{font-size:.72rem;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:600}
.stat-card .value{font-size:1.9rem;font-weight:800;line-height:1.1}
.stat-card .sub{font-size:.72rem;color:var(--muted)}

/* ── CONTENT ── */
.content{padding:0 28px 40px;display:flex;gap:20px;flex-wrap:wrap}
.section-title{font-size:.78rem;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:700;padding:16px 0 10px}

/* ── LEADERBOARD ── */
.leaderboard{flex:1;min-width:340px}
.tech-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px;transition:border-color .2s}
.tech-card:hover{border-color:var(--accent)}
.tech-card.rank-1{border-left:4px solid #b8860b}
.tech-card.rank-2{border-left:4px solid #94a3b8}
.tech-card.rank-3{border-left:4px solid #b45309}
.tech-header{display:flex;align-items:center;gap:14px;padding:16px 20px;cursor:pointer;transition:background .15s}
.tech-header:hover{background:rgba(37,99,235,.04)}
.rank-badge{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.9rem;flex-shrink:0}
.rank-badge.r1{background:rgba(184,134,11,.15);color:#b8860b}
.rank-badge.r2{background:rgba(148,163,184,.18);color:#64748b}
.rank-badge.r3{background:rgba(180,83,9,.15);color:#b45309}
.rank-badge.rn{background:var(--bg);color:var(--muted)}
.tech-info{flex:1;min-width:0}
.tech-name{font-weight:700;font-size:.95rem}
.tech-meta-row{font-size:.72rem;color:var(--muted);display:flex;gap:14px;margin-top:2px;flex-wrap:wrap}
.tech-bonus{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.bonus-val{font-size:1.4rem;font-weight:800}
.bonus-val.gold{color:#b8860b}
.bonus-val.silver{color:#64748b}
.bonus-val.bronze{color:#b45309}
.bonus-val.standard{color:var(--accent)}
.bonus-val.zero{color:var(--muted);opacity:.5}
.bonus-tag{font-size:.62rem;text-transform:uppercase;letter-spacing:.5px;font-weight:700;padding:2px 8px;border-radius:10px}
.bonus-tag.gold{background:rgba(184,134,11,.12);color:#b8860b}
.bonus-tag.silver{background:rgba(148,163,184,.15);color:#64748b}
.bonus-tag.bronze{background:rgba(180,83,9,.12);color:#b45309}
.bonus-tag.standard{background:rgba(37,99,235,.08);color:var(--accent)}
.expand-arrow{font-size:.7rem;color:var(--muted);transition:transform .2s;margin-left:8px;flex-shrink:0}
.expand-arrow.open{transform:rotate(90deg)}
.bonus-bar-wrap{display:flex;align-items:center;gap:10px;padding:0 20px 14px 70px}
.bonus-bar-track{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.bonus-bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.bonus-bar-label{font-size:.65rem;color:var(--muted);white-space:nowrap;min-width:56px;text-align:right}
.tech-detail{display:none;padding:0 20px 14px 70px}
.tech-detail.open{display:block}
.detail-table{width:100%;border-collapse:collapse;font-size:.78rem;margin-top:6px}
.detail-table th{text-align:left;padding:7px 10px;font-size:.68rem;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border)}
.detail-table td{padding:7px 10px;border-bottom:1px solid var(--border)}
.detail-table tr:last-child td{border-bottom:none}

/* ── CHART PANEL ── */
.chart-panel{flex:1;min-width:280px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-label{min-width:72px;font-size:.78rem;text-align:right;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:22px;background:var(--bg);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:.72rem;font-weight:700;color:#fff;min-width:4px}
.bar-amount{font-size:.72rem;color:var(--muted);min-width:54px;text-align:right}

/* ── YTD TABLE ── */
.ytd-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.ytd-table{width:100%;border-collapse:collapse;font-size:.82rem}
.ytd-table th{text-align:left;padding:10px 14px;font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border);background:var(--bg)}
.ytd-table td{padding:10px 14px;border-bottom:1px solid var(--border)}
.ytd-table tr:last-child td{border-bottom:none;font-weight:700;background:var(--bg)}
.ytd-table tr:hover td{background:rgba(37,99,235,.03)}
.cur-month{color:var(--accent);font-weight:700}

/* ── EMPTY STATE ── */
.no-data{padding:40px;text-align:center;color:var(--muted);font-size:.9rem;background:var(--card);border:1px solid var(--border);border-radius:var(--radius)}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .topbar,.controls,.stats-row,.content{padding-left:16px;padding-right:16px}
  .content{flex-direction:column}
}
</style>
</head>

// ── Password gate ─────────────────────────────────────────────────────────────
const _PW = 'ProStar2026';
function checkPw() {
  const val = document.getElementById('pwInput').value;
  if (val === _PW) {
    sessionStorage.setItem('psg', _PW);
    document.getElementById('pwOverlay').style.display = 'none';
    initDashboard();
  } else {
    document.getElementById('pwErr').textContent = 'Incorrect password. Try again.';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

const fmt$ = n => '$' + Number(n||0).toLocaleString('en-US', {minimumFractionDigits:0,maximumFractionDigits:0});
const fmtK = n => n >= 1000 ? '$' + (n/1000).toFixed(0) + 'K' : fmt$(n);
const MONTH_NAMES = ["","January","February","March","April","May","June","July","August","September","October","November","December"];
const MONTH_SHORT = ["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const CHART_COLORS = ["#2563eb","#059669","#7c3aed","#d97706","#ea580c","#dc2626","#0891b2","#db2777","#65a30d","#e11d48"];

// ── Freshness indicator ───────────────────────────────────────────────────────
(function() {
  const pill  = document.getElementById('freshPill');
  const label = document.getElementById('freshLabel');
  const today = new Date().toLocaleDateString('en-US', {month:'numeric',day:'numeric',year:'numeric'});
  const genDate = GENERATED_AT.split(' at ')[0];
  if (genDate === today) {
    pill.classList.add('fresh');
    label.textContent = 'Updated today at ' + GENERATED_AT.split(' at ')[1];
  } else {
    pill.classList.add('stale');
    label.textContent = 'Last updated: ' + GENERATED_AT;
  }
})();

// ── Year / month selectors ────────────────────────────────────────────────────
function populateYears() {
  const sel = document.getElementById('selYear');
  const years = Object.keys(HISTORY).map(Number).filter(y => !isNaN(y) && y > 2000).sort((a,b) => b - a);
  sel.innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join('');
  const cur = new Date().getFullYear();
  if (years.includes(cur)) sel.value = cur;
}

function onYearChange() {
  const year = parseInt(document.getElementById('selYear').value);
  const yearData = HISTORY[String(year)] || {};
  const months = Object.keys(yearData).map(Number).filter(m => m >= 1 && m <= 12).sort((a,b) => a - b);
  const selM = document.getElementById('selMonth');
  selM.innerHTML = months.map(m => `<option value="${m}">${MONTH_NAMES[m]}</option>`).join('');
  if (months.length) selM.value = months[months.length - 1];
  render();
}

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  const year  = parseInt(document.getElementById('selYear').value);
  const month = parseInt(document.getElementById('selMonth').value);
  const yearData = HISTORY[String(year)] || {};
  const data = yearData[String(month)] || yearData[month];

  const tiers = (data?.config?.rank_tiers) || RANK_TIERS;
  document.getElementById('poolPctLabel').textContent = data?.config?.pool_percent ?? POOL_PCT;
  document.getElementById('tierLabel').textContent = tiers.map(t => t.label + ' ×' + t.multiplier).join(', ');

  if (!data || !data.technicians) {
    document.getElementById('statsRow').innerHTML = '';
    document.getElementById('leaderboard').innerHTML = '<div class="no-data">No data available for this month.</div>';
    document.getElementById('chartBars').innerHTML = '';
    renderYTD(year, month);
    return;
  }
  renderStats(data, year, month);
  renderLeaderboard(data.technicians, data.total_pool);
  renderChart(data.technicians);
  renderYTD(year, month);
}

// ── Stats cards ───────────────────────────────────────────────────────────────
function renderStats(data, year, month) {
  const earners = data.technicians.filter(t => t.final_bonus > 0).length;
  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="label">Completed Jobs</div><div class="value" style="color:var(--accent)">${data.total_completed_jobs ?? '–'}</div><div class="sub">${MONTH_NAMES[month]} ${year}</div></div>
    <div class="stat-card"><div class="label">Total Work Value</div><div class="value" style="color:var(--cyan)">${fmtK(data.total_work_value)}</div><div class="sub">allocated to technicians</div></div>
    <div class="stat-card"><div class="label">Commission Pool</div><div class="value" style="color:var(--green)">${fmt$(data.total_pool)}</div><div class="sub">${data.config?.pool_percent ?? POOL_PCT}% of work value</div></div>
    <div class="stat-card"><div class="label">Technicians Earning</div><div class="value" style="color:var(--purple)">${earners} / ${data.technicians.length}</div><div class="sub">this month</div></div>
  `;
}

// ── Leaderboard ───────────────────────────────────────────────────────────────
function tierCls(label) {
  const l = (label||'').toLowerCase();
  if (l==='gold') return 'gold'; if (l==='silver') return 'silver'; if (l==='bronze') return 'bronze';
  return 'standard';
}

function renderLeaderboard(techs, pool) {
  if (!techs || !techs.length) {
    document.getElementById('leaderboard').innerHTML = '<div class="no-data">No technician data.</div>';
    return;
  }
  const maxBonus = Math.max(...techs.map(t => t.final_bonus));
  const html = techs.map(t => {
    const tc = tierCls(t.tier_label);
    const rankCls = t.rank <= 3 ? ' rank-' + t.rank : '';
    const rbCls = t.rank <= 3 ? 'r' + t.rank : 'rn';
    const barW = maxBonus > 0 ? Math.round((t.final_bonus / maxBonus) * 100) : 0;
    const barColor = tc==='gold' ? '#b8860b' : tc==='silver' ? '#94a3b8' : tc==='bronze' ? '#b45309' : 'var(--accent)';
    const jobRows = (t.jobs||[]).map(j => `
      <tr>
        <td>#${j.job_id}</td>
        <td>${j.customer||'–'}</td>
        <td style="color:var(--muted);font-size:.72rem">${j.job_name||''}</td>
        <td style="text-align:right">${fmt$(j.allocated_value)}</td>
      </tr>`).join('');
    return `
      <div class="tech-card${rankCls}">
        <div class="tech-header" onclick="toggleDetail(this)">
          <div class="rank-badge ${rbCls}">${t.rank}</div>
          <div class="tech-info">
            <div class="tech-name">${t.technician}</div>
            <div class="tech-meta-row">
              <span>${t.job_count} job${t.job_count!==1?'s':''}</span>
              <span>Allocated: ${fmt$(t.allocated_value)}</span>
              ${t.multiplier&&t.multiplier>1?`<span>Boost: ×${t.multiplier}</span>`:''}
            </div>
          </div>
          <div class="tech-bonus">
            <div class="bonus-val ${tc}">${fmt$(t.final_bonus)}</div>
            <div class="bonus-tag ${tc}">${t.tier_label||'Standard'}</div>
          </div>
          <span class="expand-arrow">▶</span>
        </div>
        <div class="bonus-bar-wrap">
          <div class="bonus-bar-track"><div class="bonus-bar-fill" style="width:${barW}%;background:${barColor}"></div></div>
          <div class="bonus-bar-label">${fmt$(t.final_bonus)}</div>
        </div>
        <div class="tech-detail">
          ${jobRows?`<table class="detail-table"><thead><tr><th>Job</th><th>Customer</th><th>Description</th><th style="text-align:right">Value</th></tr></thead><tbody>${jobRows}</tbody></table>`:''}
        </div>
      </div>`;
  }).join('');
  document.getElementById('leaderboard').innerHTML = html;
}

function toggleDetail(header) {
  const arrow = header.querySelector('.expand-arrow');
  const detail = header.closest('.tech-card').querySelector('.tech-detail');
  const open = detail.classList.toggle('open');
  if (arrow) arrow.classList.toggle('open', open);
}

// ── Bar chart ─────────────────────────────────────────────────────────────────
function renderChart(techs) {
  if (!techs||!techs.length) { document.getElementById('chartBars').innerHTML=''; return; }
  const maxBonus = Math.max(...techs.map(t => t.final_bonus));
  const bars = techs.map((t, i) => {
    const pct = maxBonus > 0 ? Math.round((t.final_bonus/maxBonus)*92) : 0;
    const tc = tierCls(t.tier_label);
    const color = tc==='gold'?'#b8860b':tc==='silver'?'#94a3b8':tc==='bronze'?'#b45309':CHART_COLORS[i%CHART_COLORS.length];
    const name = t.technician.split(' ')[0];
    const amt = fmt$(t.final_bonus);
    return `
      <div class="bar-row">
        <div class="bar-label" title="${t.technician}">${name}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}">${pct>20?amt:''}</div></div>
        <div class="bar-amount">${amt}</div>
      </div>`;
  }).join('');
  document.getElementById('chartBars').innerHTML = bars;
}

// ── YTD table ─────────────────────────────────────────────────────────────────
function renderYTD(selYear, selMonth) {
  const yearData = HISTORY[String(selYear)] || {};
  const months = Object.keys(yearData).map(Number).filter(m => m>=1&&m<=12).sort((a,b)=>a-b);
  if (!months.length) { document.getElementById('ytd').innerHTML=''; return; }
  let ytdVal=0, ytdPool=0;
  const rows = months.map(m => {
    const d = yearData[String(m)] || yearData[m];
    if (!d) return '';
    ytdVal  += d.total_work_value||0;
    ytdPool += d.total_pool||0;
    const isCur = m===selMonth;
    const top = d.technicians?.length ? d.technicians.reduce((b,t)=>t.final_bonus>(b.final_bonus||0)?t:b, {}) : null;
    const topName = top ? top.technician.split(' ')[0]+' '+fmt$(top.final_bonus) : '–';
    return `<tr>
      <td class="${isCur?'cur-month':''}">${isCur?'▶ ':''}${MONTH_SHORT[m]}</td>
      <td>${fmtK(d.total_work_value)}</td>
      <td style="color:var(--green)">${fmt$(d.total_pool)}</td>
      <td style="color:var(--muted);font-size:.78rem">${topName}</td>
    </tr>`;
  }).join('');
  document.getElementById('ytd').innerHTML = `
    <div class="ytd-wrap">
      <table class="ytd-table">
        <thead><tr><th>Month</th><th>Work Value</th><th>Pool</th><th>Top Earner</th></tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr>
          <td>YTD Total</td>
          <td>${fmtK(ytdVal)}</td>
          <td style="color:var(--green)">${fmt$(ytdPool)}</td>
          <td></td>
        </tr></tfoot>
      </table>
    </div>`;
}

// ── Init ──────────────────────────────────────────────────────────────────────
function initDashboard() {
  populateYears();
  onYearChange();
}

if (sessionStorage.getItem('psg') === _PW) {
  initDashboard();
} else {
  const ov = document.getElementById('pwOverlay');
  ov.style.display = 'flex';
  setTimeout(() => document.getElementById('pwInput').focus(), 50);
}
</script>
